name: CI
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run scripted tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: coursier/cache-action@v6

      - uses: VirtusLab/scala-cli-setup@main
        with:
          power: true

      - uses: extractions/setup-just@v3

      - run: just scripted

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    needs: test
    name: Publish to Maven Central
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.compute-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: coursier/cache-action@v6

      - uses: VirtusLab/scala-cli-setup@main
        with:
          power: true

      - uses: extractions/setup-just@v3

      - name: Compute version
        id: compute-version
        # Run a dummy publish to coerce scala-cli into computing the version
        # (via publish.computeVersion git:dynver), then parse it from the
        # "Publishing org:name:VERSION" line.
        run: |
          line=$(scala-cli --power publish plugin --workspace . --dummy --signer none \
            --module-name scala-cli-sbt-plugin-poc_2.12_1.0 2>&1 | grep -E '^Publishing ' | head -1)
          version="${line##*:}"
          echo "Computed version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: |
          scala-cli config publish.credentials central.sonatype.com env:SONATYPE_USERNAME env:SONATYPE_PASSWORD
          scala-cli config publish.credentials ossrh-staging-api.central.sonatype.com env:SONATYPE_USERNAME env:SONATYPE_PASSWORD
          ./.github/workflows/import-gpg.sh
          just publish --signer gpg --gpg-key DB33C5B9DA1A245B
        env:
          PGP_PASSPHRASE: ""
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}

  verify-release:
    needs: publish
    name: Re-run scripted tests against published artifact
    runs-on: ubuntu-22.04
    env:
      PLUGIN_VERSION: ${{ needs.publish.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: coursier/cache-action@v6

      - uses: VirtusLab/scala-cli-setup@main
        with:
          power: true

      - uses: extractions/setup-just@v3

      - name: Wait for Central sync
        # Releases land on repo1.maven.org; snapshots on
        # central.sonatype.com/repository/maven-snapshots/. Poll the right one.
        run: |
          if [[ "$PLUGIN_VERSION" == *-SNAPSHOT ]]; then
            base="https://central.sonatype.com/repository/maven-snapshots"
          else
            base="https://repo1.maven.org/maven2"
          fi
          url="${base}/org/polyvariant/scala-cli-sbt-plugin-poc_2.12_1.0/${PLUGIN_VERSION}/maven-metadata.xml"
          # For non-snapshot, maven-metadata.xml lives one level up; check the .pom instead.
          if [[ "$PLUGIN_VERSION" != *-SNAPSHOT ]]; then
            url="${base}/org/polyvariant/scala-cli-sbt-plugin-poc_2.12_1.0/${PLUGIN_VERSION}/scala-cli-sbt-plugin-poc_2.12_1.0-${PLUGIN_VERSION}.pom"
          fi
          for i in $(seq 1 30); do
            if curl --fail --silent --head "$url" > /dev/null; then
              echo "Found $url"
              exit 0
            fi
            echo "Not yet on Central ($i/30), sleeping..."
            sleep 30
          done
          echo "Artifact never appeared at $url"
          exit 1

      - run: just scripted-released
